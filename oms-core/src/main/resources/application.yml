spring:
  application:
    name: multi-asset-oms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oms}
    username: ${SPRING_DATASOURCE_USERNAME:oms}
    password: ${SPRING_DATASOURCE_PASSWORD:oms}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
